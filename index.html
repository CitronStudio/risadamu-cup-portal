<!doctype html>
<html lang="ja">
<head>
<!--
  別の大会用にこのサイトを流用する場合、書き換えが必要なのは主に2箇所:
    1. js/config.js（スプレッドシートID・シートgid・大会名・チーム色）
    2. この下のtitle / meta description / h1（SEO・リンクプレビュー用なので静的HTMLのまま置いている）
  それ以外（js/app.js, css/style.css等）は基本編集不要。
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>History of りさだむ杯</title>
<meta name="description" content="りさだむ杯の大会結果・個人成績・対戦成績まとめ">
<meta name="theme-color" content="#3b5bdb">
<link rel="stylesheet" href="css/style.css">
<script>
  // ページ描画前にテーマを確定させ、切り替え時のちらつき（FOUC）を防ぐ。
  (function () {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    }
  })();
</script>
</head>
<body>
<header class="top-bar">
  <!-- ヘッダーの見出し。上のtitle/meta descriptionと合わせて書き換える -->
  <h1>History of りさだむ杯</h1>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="ダークモード切り替え"></button>
</header>

<main id="app"></main>

<nav class="bottom-nav">
  <a class="nav-item" data-page="home" href="#/">
    <span class="nav-icon">🏆</span>
    <span>大会一覧</span>
  </a>
  <a class="nav-item" data-page="ranking" href="#/ranking">
    <span class="nav-icon">📊</span>
    <span>個人成績</span>
  </a>
  <a class="nav-item" data-page="h2h" href="#/h2h">
    <span class="nav-icon">⚔️</span>
    <span>対戦成績</span>
  </a>
  <a class="nav-item" data-page="live" href="#/live">
    <span class="nav-icon">🀄️</span>
    <span>開催中</span>
  </a>
</nav>

<script src="js/config.js"></script>
<script src="js/gviz.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/app.js"></script>
</body>
</html>
